# Port du serveur Spring Boot
server.port=8082

# Nom de l'application
spring.application.name=TP_2_Authentification_fragile

# Base MySQL pour l'application normale
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

